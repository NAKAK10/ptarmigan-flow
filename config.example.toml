language = "en"

[stt]
# format: "<backend>:<model>"
# examples:
#   moonshine:base
#   moonshine:tiny
#   voxtral:mistralai/Voxtral-Mini-4B-Realtime-2602
#   vllm:mistralai/Voxtral-Mini-4B-Realtime-2602
model = "moonshine:base"
# Auto-stop backend resources after this many idle seconds.
# 0 disables idle shutdown.
idle_shutdown_seconds = 30.0

[hotkey]
key = "right_cmd"

[audio]
sample_rate = 16000
channels = 1
dtype = "float32"
max_record_seconds = 30
# Keep recording this many seconds after key release to avoid clipping the utterance tail.
# Value is clamped to [0.0, 1.0].
release_tail_seconds = 0.25
# Reconcile missed release callbacks when hotkey is no longer pressed.
# Value is clamped to >= 0.0.
hotkey_release_reconcile_seconds = 0.25
# Extra fallback reconcile when hotkey appears pressed but recorder buffer stops growing.
# Value is clamped to >= 0.0.
hotkey_idle_reconcile_seconds = 1.0
# Add trailing silence before transcription for decoder stability.
# Value is clamped to [0.0, 1.0].
trailing_silence_seconds = 1.0
# If set, this exact input device is used first (name or index).
# Use `mflow list devices` to view and choose from available input devices.
# input_device = "MacBook Air Microphone"
# How to pick input when audio.input_device is unset:
#   playback_friendly: avoid Bluetooth/HFP mic when possible (recommended for music playback)
#   system_default: always use macOS default input device
#   external_preferred: prefer non-default external input when available
input_device_policy = "playback_friendly"

[model]
device = "mps"

[output]
# direct_typing: types text directly (clipboard is untouched)
# clipboard_paste: copies to clipboard then pastes once on release (no streaming chunks)
mode = "direct_typing"
paste_shortcut = "cmd+v"

[runtime]
log_level = "INFO"
notify_on_error = true
# Toggle runtime UI overlays.
ui_enabled = true
# Show right-bottom activity icon while recording/transcribing.
activity_indicator_enabled = true
# Pixels from right edge.
activity_indicator_margin_right = 24
# Pixels from bottom edge.
activity_indicator_margin_bottom = 24
# Overlay icon size in pixels (minimum 16).
activity_indicator_size = 42

[text]
# Optional transcription correction dictionary path.
# If not set, this default path is used:
#   ~/.config/moonshine-flow/transcription_corrections.toml
# Example dictionary file is bundled at:
#   https://github.com/NAKAK10/moonshine-flow/blob/main/transcription_corrections.example.toml
# dictionary_path = "~/.config/moonshine-flow/transcription_corrections.toml"

[text.llm_correction]
# Optional LLM-based post-correction after Moonshine transcription.
# always: enable every run
# never: disable every run
# ask: ask only on interactive (TTY) run; non-interactive run behaves as never
mode = "never"
# provider = "ollama" or "lmstudio" or custom string
provider = "ollama"
# Ollama default: http://localhost:11434
# LM Studio default: http://localhost:1234/v1
base_url = "http://localhost:11434"
model = "qwen2.5:7b-instruct"
# Clamped to [0.5, 5.0]
timeout_seconds = 5.0
# Clamped to [50, 5000]
max_input_chars = 500
# Reserved for OpenAI-compatible servers; ignored by most local setups.
# api_key = "sk-..."
# Enable tool calling only when using a model/server that supports it.
enabled_tools = false
